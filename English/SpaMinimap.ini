; Spa-Francorchamps map configuration.
; You can edit these values and reload the scripts (or restart the game) to apply the changes.
; Use a dot (.) as the decimal separator, not a comma.

[Circuit]
; If the circuit mod moves in the GTA world (pure translation,
; without rotation), put here how much it has moved and the map will compensate automatically.
; 0,0 = circuit in its original position.
OffsetX=0
OffsetY=0

; How close (in game units, roughly meters) the player needs to be
; to the recorded line to be considered "on the track". Adjust to your liking.
OnTrackDistance=20

[Map]
; Position of the map's top-left corner on screen (pixels).
PosX=-80
PosY=0

; Size of the map on screen (pixels).
Width=400
Height=400

[Pin]
; Size of the marker that shows your position (pixels).
Width=6
Height=6
