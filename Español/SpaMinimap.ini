; Configuracion del mapa de Spa-Francorchamps.
; Puedes editar estos valores y recargar los scripts (o reiniciar el juego) para ver los cambios.
; Usa punto (.) como separador decimal, no coma.

[Circuit]
; Si el mod del circuito se mueve de sitio en el mundo de GTA (desplazamiento,
; sin rotarlo), pon aqui cuanto se desplazo para que el mapa lo siga
; automaticamente. 0,0 = circuito en su posicion original.
OffsetX=0
OffsetY=0

; Cercania de la pista (en unidades del juego, aproximadamente metros)
; para que el jugador se considere "en el circuito". Ajusta a tu gusto.
OnTrackDistance=20

[Map]
; Posicion de la esquina superior izquierda del mapa en pantalla (pixeles).
PosX=-80
PosY=0

; Tamano del mapa en pantalla (pixeles).
Width=400
Height=400

[Pin]
; Tamano del punto que marca tu posicion (pixeles).
Width=6
Height=6